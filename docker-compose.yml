services:
  proxy:
    image: caddy:2-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - backend
      - frontend

  backend:
    build:
      context: .
      dockerfile: src/WeatherWatch.Api/Dockerfile
    environment:
      # Development so it loads appsettings.Development.json (keys + base URLs) baked into the image.
      ASPNETCORE_ENVIRONMENT: Development
      # Override only the DB path so it lands on the writable volume.
      ConnectionStrings__CityStore: "Data Source=/data/citywatch.db"
    volumes:
      - city-db:/data

  frontend:
    build:
      context: ./frontend
      args:
        # Same-origin: the browser calls /api, which the proxy routes to the backend.
        PUBLIC_API_BASE_URL: /api
    environment:
      # So SvelteKit resolves server-side relative fetches to the proxy (reachable in-network).
      ORIGIN: http://proxy:8080
    depends_on:
      - backend

volumes:
  city-db:
